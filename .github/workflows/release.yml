name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run tests
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: fsrt-linux-x86_64.tar.gz

          - name: macos-x86_64
            os: macos-13
            archive: fsrt-macos-x86_64.tar.gz

          - name: macos-aarch64
            os: macos-14
            archive: fsrt-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build fsrt
        run: cargo build --release --locked -p fsrt

      - name: Package binary
        run: |
          mkdir dist
          cp target/release/fsrt dist/
          cp README.md LICENSE-APACHE LICENSE-MIT dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download packaged binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --title "FSRT ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag