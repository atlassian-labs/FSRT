name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run tests
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: fsrt
            archive: fsrt-linux-x86_64.tar.gz

          - name: macos-aarch64
            os: macos-latest
            binary: fsrt
            archive: fsrt-macos-aarch64.tar.gz

          - name: windows-x86_64
            os: windows-latest
            binary: fsrt.exe
            archive: fsrt-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build fsrt
        run: cargo build --release --locked -p fsrt

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp "target/release/${{ matrix.binary }}" dist/
          cp README.md LICENSE-APACHE LICENSE-MIT dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item "target/release/${{ matrix.binary }}" dist/
          Copy-Item README.md, LICENSE-APACHE, LICENSE-MIT dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --title "FSRT ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag